dingtalk_groups:
  dev-group:
    webhook: "https://oapi.dingtalk.com/robot/send?access_token=YOUR_TOKEN_HERE"
    secret: "YOUR_SECRET_HERE"
  release-group:
    webhook: "https://oapi.dingtalk.com/robot/send?access_token=YOUR_TOKEN_HERE"
    secret: "YOUR_SECRET_HERE"

routes:
  - repo: "myorg/my-repo"
    events: ["issues", "pull_request", "push"]
    groups: ["dev-group"]
  - repo: "myorg/my-repo"
    events: ["release"]
    groups: ["release-group"]

mentions:
  # Whether to @ the mapped DingTalk user when these GitHub events happen.
  issue_assignees: false
  pull_request_assignees: false
  pull_request_reviewers: false
  # GitHub login -> DingTalk user ID.
  github_to_dingtalk_ids:
    dev1: "DINGTALK_USER_ID_OF_DEV1"
    reviewer1: "DINGTALK_USER_ID_OF_REVIEWER1"

# Optional: events not matching any route are sent to this group.
# If not set, unmatched events are discarded.
# default_group: "dev-group"
